name: Refresh release news data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh feed data
        run: npm run fetch-news

      - name: Commit updated data
        run: |
          if git diff --quiet public/data/news.json public/data/suggestions.json; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json public/data/suggestions.json
          git commit -m "chore(data): refresh release feed cache"
          git push
