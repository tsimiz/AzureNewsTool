<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure News Tool</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header>
      <div class="inner">
        <h1>Azure &amp; Microsoft Release News</h1>
        <p class="subtitle">Track fresh Azure and Microsoft release announcements in one place.</p>
      </div>
    </header>
    <main>
      <section class="panel">
        <div class="search-row">
          <label for="searchInput">Search by keyword or category</label>
          <input id="searchInput" type="search" list="suggestions" placeholder="Try: Security, Kubernetes, Copilot..." />
          <datalist id="suggestions"></datalist>
        </div>
        <p id="stats"></p>
        <p id="generatedAt"></p>
      </section>
      <section id="newsList" aria-live="polite"></section>
    </main>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
