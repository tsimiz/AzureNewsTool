<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure News Tool</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header>
      <div class="inner">
        <h1>Azure &amp; Microsoft Release News</h1>
        <p class="subtitle">Track fresh Azure and Microsoft release announcements in one place.</p>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="aiSettingsBtn" title="Configure Azure AI Foundry" aria-label="Configure Azure AI Foundry">⚙️</button>
        <button class="btn-icon" id="darkModeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
      </div>
    </header>

    <!-- AI Settings Modal -->
    <div class="modal-backdrop" id="aiModal" role="dialog" aria-modal="true" aria-labelledby="aiModalTitle">
      <div class="modal">
        <h2 id="aiModalTitle">Azure AI Foundry Settings</h2>
        <p>Configure your Azure AI Foundry endpoint to enable on-demand AI summaries for news articles.</p>
        <label for="aiEndpoint">Endpoint URL</label>
        <input type="text" id="aiEndpoint" placeholder="https://&lt;resource&gt;.openai.azure.com" />
        <label for="aiDeployment">Deployment name</label>
        <input type="text" id="aiDeployment" placeholder="gpt-4o" />
        <label for="aiKey">API key</label>
        <input type="password" id="aiKey" placeholder="Your Azure AI Foundry API key" />
        <div class="modal-actions">
          <button class="btn-secondary" id="aiModalCancel">Cancel</button>
          <button class="btn-primary" id="aiModalSave">Save</button>
        </div>
      </div>
    </div>

    <main>
      <section id="debugPanel" hidden aria-label="Debug: source status"></section>
      <section class="panel">
        <div class="search-row">
          <label for="searchInput">Search by keyword or category</label>
          <input id="searchInput" type="search" list="suggestions" placeholder="Try: Security, Kubernetes, Copilot..." />
          <datalist id="suggestions"></datalist>
        </div>
        <p id="stats"></p>
        <p id="generatedAt"></p>
      </section>
      <section id="newsList" aria-live="polite"></section>
    </main>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
