<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure News Tool</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="header-brand">
          <h1>Azure &amp; Microsoft Release News</h1>
          <p class="subtitle">Track fresh Azure and Microsoft release announcements in one place.</p>
        </div>
        <div class="header-right">
          <div class="header-search">
            <input id="searchInput" type="search" list="suggestions" placeholder="Search…" aria-label="Search by keyword or category" />
            <datalist id="suggestions"></datalist>
          </div>
          <div class="header-actions">
            <button class="btn-icon" id="darkModeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
          </div>
        </div>
      </div>
      <nav class="topic-filters" aria-label="Filter by topic">
        <button class="topic-btn active" data-category="">All</button>
        <button class="topic-btn" data-category="azure">Azure</button>
        <button class="topic-btn" data-category="microsoft-365">Microsoft 365</button>
        <button class="topic-btn" data-category="power-platform">Power Platform</button>
        <button class="topic-btn" data-category="security">Security</button>
        <button class="topic-btn" data-category="developer">Developer</button>
      </nav>
      <nav id="subcategoryFilters" class="subcategory-filters" hidden aria-label="Filter by subcategory"></nav>
    </header>

    <main>
      <section id="debugPanel" hidden aria-label="Debug: source status"></section>
      <div class="stats-row">
        <p id="stats"></p>
        <p id="generatedAt"></p>
      </div>
      <section id="newsList" aria-live="polite"></section>
      <div id="olderContainer" hidden>
        <button id="olderBtn" class="btn-older">More</button>
      </div>
    </main>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
